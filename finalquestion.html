<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Final Question ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

#confetti{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:9999;
}

.confetti{
position:absolute;
width:12px;
height:12px;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-20px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}

}

</style>

</head>

<body>

<audio id="bgMusic" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="confetti"></div>

<section class="hero">

<h1 id="typing"></h1>

<p class="subtitle">

You've reached the final question.

❤️

<br><br>

Thank you for spending your time reading everything.

It truly means a lot.

<br><br>

Now...

Can I ask one last question?

😊

</p>

<div class="buttons">

<button class="yes-btn" onclick="celebrate()">

YES ❤️

</button>

<button class="no-btn" id="noBtn">

NO 🙈

</button>

</div>

</section>

<script>

const text="Will You Keep Smiling? ❤️";

let i=0;

function typeWriter(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,80);

}

}

typeWriter();

const music=document.getElementById("bgMusic");

document.body.addEventListener("click",()=>{

music.play();

},{once:true});

const noBtn=document.getElementById("noBtn");

function moveButton(){

const x=Math.random()*(window.innerWidth-noBtn.offsetWidth-30);

const y=Math.random()*(window.innerHeight-noBtn.offsetHeight-30);

noBtn.style.position="absolute";

noBtn.style.left=x+"px";

noBtn.style.top=y+"px";

}

noBtn.addEventListener("mouseenter",moveButton);

noBtn.addEventListener("click",moveButton);

function celebrate(){

for(let i=0;i<250;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background="hsl("+Math.random()*360+",100%,60%)";

c.style.animationDuration=(Math.random()*3+2)+"s";

document.getElementById("confetti").appendChild(c);

setTimeout(()=>{

c.remove();

},5000);

}

setTimeout(()=>{

document.body.style.opacity="0";

setTimeout(()=>{

window.location="ending.html";

},700);

},2500);

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

}

setInterval(createHeart,300);

function createPetal(){

const petal=document.createElement("div");

petal.className="petal";

petal.innerHTML="🌸";

petal.style.left=Math.random()*100+"vw";

petal.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(petal);

setTimeout(()=>{

petal.remove();

},9000);

}

setInterval(createPetal,800);

</script>

</body>

</html>
